<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .container {
            padding: 50px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 6rem;
            margin-bottom: 10px;
            letter-spacing: 5px;
        }

        h2 {
            margin-bottom: 15px;
            font-weight: 500;
        }

        p {
            opacity: 0.85;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            background: linear-gradient(45deg, #ff9966, #ff5e62);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 94, 98, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 94, 98, 0.6);
        }

        .emoji {
            font-size: 3rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="emoji">🚧</div>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you are looking for doesn’t exist or was moved.</p>

        <button class="btn" onclick="goHome()">Go to Home</button>
    </div>

    <script>
        function goHome() {
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
